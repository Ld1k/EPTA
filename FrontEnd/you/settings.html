<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ЕПТА - Настройки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000000;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            pointer-events: none;
        }

        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: -1;
            pointer-events: none;
        }

        .falling-numbers {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .falling-number {
            position: absolute;
            top: -40px;
            font-weight: bold;
            pointer-events: none;
            animation: fallDown linear forwards;
            font-family: monospace;
        }

        .falling-number:nth-child(3n+1) { color: #00ffcc; opacity: 0.3; }
        .falling-number:nth-child(3n+2) { color: #61DE2A; opacity: 0.25; }
        .falling-number:nth-child(3n+3) { color: #3BA51A; opacity: 0.2; }

        @keyframes fallDown {
            0% {
                transform: translateY(-40px) rotate(0deg);
                opacity: 0.3;
            }
            80% {
                opacity: 0.1;
            }
            100% {
                transform: translateY(105vh) rotate(360deg);
                opacity: 0;
            }
        }

        .header {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            padding: 12px 0;
            border-bottom: 1px solid rgba(97, 222, 42, 0.3);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            color: #61DE2A;
            font-size: 24px;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: 2px;
        }

        .burger-menu {
            position: fixed;
            top: 12px;
            right: 20px;
            z-index: 1000;
        }

        .burger-icon {
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            border: 1px solid rgba(97, 222, 42, 0.3);
            transition: all 0.3s;
        }

        .burger-icon:hover {
            border-color: #61DE2A;
            background: rgba(97, 222, 42, 0.1);
        }

        .burger-icon span {
            height: 2px;
            background: #61DE2A;
            width: 22px;
            transition: 0.3s;
        }

        .menu-panel {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            border-left: 2px solid #61DE2A;
            transition: right 0.3s ease;
            z-index: 999;
            padding-top: 70px;
        }

        .menu-panel.active {
            right: 0;
        }

        .menu-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 20px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            color: #e0e0e0;
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.3s;
            font-size: 16px;
            font-weight: 500;
        }

        .menu-item:hover, .menu-item.active {
            background: rgba(97, 222, 42, 0.12);
            color: #61DE2A;
        }

        .menu-icon {
            width: 24px;
            height: 24px;
            filter: brightness(0) invert(1);
        }

        .menu-item.active .menu-icon,
        .menu-item:hover .menu-icon {
            filter: brightness(0) saturate(100%) invert(74%) sepia(54%) saturate(1234%) hue-rotate(43deg) brightness(98%) contrast(91%);
        }

        .settings-container {
            max-width: 800px;
            margin: 80px auto 20px;
            padding: 0 16px;
            position: relative;
            z-index: 10;
        }

        .profile-header {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(97, 222, 42, 0.2);
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .profile-header:hover {
            background: rgba(0, 0, 0, 0.6);
            border-color: rgba(97, 222, 42, 0.4);
        }

        .profile-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(34, 34, 34, 0.95);
            border: 2px solid #61DE2A;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 18px;
            font-weight: 700;
            color: #e0e0e0;
            margin-bottom: 4px;
        }

        .profile-phone {
            font-size: 13px;
            color: #888;
            margin-bottom: 2px;
        }

        .profile-username {
            font-size: 13px;
            color: #61DE2A;
        }

        .profile-arrow {
            color: #61DE2A;
            font-size: 20px;
            opacity: 0.6;
        }

        .settings-section {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(97, 222, 42, 0.2);
            margin-bottom: 16px;
            overflow: hidden;
        }

        .section-header {
            padding: 16px 20px;
            font-size: 14px;
            font-weight: 600;
            color: #61DE2A;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(97, 222, 42, 0.05);
            border-bottom: 1px solid rgba(97, 222, 42, 0.1);
        }

        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
            cursor: pointer;
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-item:hover {
            background: rgba(97, 222, 42, 0.05);
        }

        .setting-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
        }

        .setting-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .setting-info {
            flex: 1;
        }

        .setting-name {
            font-size: 16px;
            color: #e0e0e0;
            margin-bottom: 2px;
        }

        .setting-value {
            font-size: 13px;
            color: #61DE2A;
        }

        .setting-right {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #888;
            font-size: 14px;
        }

        .setting-arrow {
            font-size: 18px;
            color: #61DE2A;
            opacity: 0.5;
        }

        .language-selector {
            background: transparent;
            border: none;
            color: #61DE2A;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            outline: none;
        }

        .language-selector option {
            background: #1a1a1a;
            color: #e0e0e0;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.95), rgba(20, 20, 20, 0.98));
            border: 2px solid #61DE2A;
            border-radius: 24px;
            padding: 24px;
            width: 90%;
            max-width: 360px;
            text-align: center;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: #61DE2A;
            margin-bottom: 16px;
        }

        .modal-text {
            color: #aaa;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .modal-btn {
            padding: 12px 24px;
            background: rgba(97, 222, 42, 0.15);
            border: 1px solid #61DE2A;
            border-radius: 30px;
            color: #61DE2A;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-btn:hover {
            background: rgba(97, 222, 42, 0.3);
        }

        @media (max-width: 768px) {
            .settings-container {
                margin-top: 70px;
                padding: 0 12px;
            }
            .profile-header {
                padding: 16px;
            }
            .profile-avatar {
                width: 50px;
                height: 50px;
            }
            .profile-name {
                font-size: 16px;
            }
            .setting-item {
                padding: 12px 16px;
            }
            .setting-icon {
                width: 28px;
                font-size: 18px;
            }
            .setting-name {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <video autoplay loop muted playsinline class="background-video">
        <source src="../oboi/video.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
    <div class="falling-numbers" id="fallingNumbers"></div>

    <div class="burger-menu" id="burgerMenu">
        <div class="burger-icon" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="menu-panel" id="menuPanel">
            <div class="menu-content">
                <a href="../lenta/feed.html" class="menu-item">
                    <img src="../png/grid.png" class="menu-icon" alt=""> Лента
                </a>
                <a href="../you/index.html" class="menu-item">
                    <img src="../png/portrait.png" class="menu-icon" alt=""> Профиль
                </a>
                <a href="settings.html" class="menu-item active">
                    <img src="../png/sun.png" class="menu-icon" alt=""> Настройки
                </a>
                <a href="../sms/sms.html" class="menu-item">
                    <img src="../png/comment.png" class="menu-icon" alt=""> Чаты
                </a>
                <a href="../support/support.html" class="menu-item">
                    <img src="../png/portrait.png" class="menu-icon" alt=""> Поддержка
                </a>
            </div>
        </div>
    </div>

    <header class="header">
        <div class="header-inner">
            <a href="../lenta/feed.html" class="logo">ЕПТА</a>
        </div>
    </header>

    <div class="settings-container">
        <!-- Профиль -->
        <div class="profile-header" onclick="showComingSoon('Редактирование профиля')">
            <div class="profile-avatar">
                <img src="../png/portrait.png" alt="" id="profileAvatar">
            </div>
            <div class="profile-info">
                <div class="profile-name" id="profileName">Киршик</div>
                <div class="profile-phone" id="profilePhone">5562516457</div>
                <div class="profile-username" id="profileUsername">@lirikalp</div>
            </div>
            <div class="profile-arrow">›</div>
        </div>

        <!-- ОСНОВНОЕ -->
        <div class="settings-section">
            <div class="section-header">ОСНОВНОЕ</div>
            
            <div class="setting-item" onclick="showComingSoon('ЕПТА Премиум')">
                <div class="setting-left">
                    <div class="setting-icon">⭐</div>
                    <div class="setting-info">
                        <div class="setting-name">ЕПТА Премиум</div>
                    </div>
                </div>
                <div class="setting-right">
                    <span class="setting-value">Купить</span>
                    <span class="setting-arrow">›</span>
                </div>
            </div>

            <div class="setting-item" onclick="showComingSoon('Мой аккаунт')">
                <div class="setting-left">
                    <div class="setting-icon">👤</div>
                    <div class="setting-info">
                        <div class="setting-name">Мой аккаунт</div>
                    </div>
                </div>
                <div class="setting-right">
                    <span class="setting-arrow">›</span>
                </div>
            </div>

            <div class="setting-item" onclick="showComingSoon('Конфиденциальность')">
                <div class="setting-left">
                    <div class="setting-icon">🔒</div>
                    <div class="setting-info">
                        <div class="setting-name">Конфиденциальность</div>
                    </div>
                </div>
                <div class="setting-right">
                    <span class="setting-arrow">›</span>
                </div>
            </div>
        </div>

        <!-- ЧАТЫ -->
        <div class="settings-section">
            <div class="section-header">ЧАТЫ</div>
            
            <div class="setting-item" onclick="showComingSoon('Настройки чатов')">
                <div class="setting-left">
                    <div class="setting-icon">💬</div>
                    <div class="setting-info">
                        <div class="setting-name">Настройки чатов</div>
                    </div>
                </div>
                <div class="setting-right">
                    <span class="setting-arrow">›</span>
                </div>
            </div>
        </div>

        <!-- МЕДИА И ЯЗЫК -->
        <div class="settings-section">
            <div class="section-header">МЕДИА И ЯЗЫК</div>
            
            <div class="setting-item">
                <div class="setting-left">
                    <div class="setting-icon">🌐</div>
                    <div class="setting-info">
                        <div class="setting-name">Язык</div>
                    </div>
                </div>
                <div class="setting-right">
                    <select class="language-selector" id="languageSelect" onchange="changeLanguage(this.value)">
                        <option value="ru" selected>Русский</option>
                        <option value="en">English</option>
                        <option value="kk">Қазақша</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- ДРУГОЕ -->
        <div class="settings-section">
            <div class="section-header">ДРУГОЕ</div>
            
            <div class="setting-item" onclick="showComingSoon('Масштаб по умолчанию')">
                <div class="setting-left">
                    <div class="setting-icon">🔍</div>
                    <div class="setting-info">
                        <div class="setting-name">Масштаб по умолчанию</div>
                    </div>
                </div>
                <div class="setting-right">
                    <span class="setting-value">100%</span>
                    <span class="setting-arrow">›</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-title" id="modalTitle">В разработке</div>
            <div class="modal-text" id="modalText">Эта функция будет доступна в следующем обновлении ЕПТА 42</div>
            <button class="modal-btn" onclick="closeModal()">Понятно</button>
        </div>
    </div>

    <script>
        function loadProfile() {
            const savedName = localStorage.getItem('epta_username') || 'Киршик';
            const savedPhone = localStorage.getItem('epta_phone') || '5562516457';
            const savedUsername = localStorage.getItem('epta_user_tag') || '@lirikalp';
            
            document.getElementById('profileName').textContent = savedName;
            document.getElementById('profilePhone').textContent = savedPhone;
            document.getElementById('profileUsername').textContent = savedUsername;
        }

        function changeLanguage(lang) {
            localStorage.setItem('epta_language', lang);
            showComingSoon(`Язык изменён на ${lang === 'ru' ? 'Русский' : lang === 'en' ? 'English' : 'Қазақша'}`);
        }

        function showComingSoon(feature) {
            const modal = document.getElementById('modalOverlay');
            const title = document.getElementById('modalTitle');
            const text = document.getElementById('modalText');
            
            title.textContent = feature;
            text.textContent = 'Эта функция будет доступна в следующем обновлении ЕПТА 42';
            modal.classList.add('active');
        }

        function closeModal() {
            const modal = document.getElementById('modalOverlay');
            modal.classList.remove('active');
        }

        function toggleMenu() {
            const panel = document.getElementById('menuPanel');
            panel.classList.toggle('active');
        }

        document.addEventListener('click', function(e) {
            const menu = document.getElementById('burgerMenu');
            const panel = document.getElementById('menuPanel');
            if (menu && panel && !menu.contains(e.target) && panel.classList.contains('active')) {
                panel.classList.remove('active');
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        function createFallingNumbers() {
            const container = document.getElementById('fallingNumbers');
            if (!container) return;
            
            function spawnNumber() {
                if (container.children.length > 40) return;
                const number = document.createElement('div');
                number.className = 'falling-number';
                number.textContent = '42';
                const size = Math.random() * 14 + 12;
                const left = Math.random() * 100;
                const duration = Math.random() * 8 + 5;
                const delay = Math.random() * 3;
                number.style.cssText = `left: ${left}%; font-size: ${size}px; animation-duration: ${duration}s; animation-delay: ${delay}s;`;
                container.appendChild(number);
                setTimeout(() => number.remove(), (duration + delay) * 1000);
            }
            
            for (let i = 0; i < 15; i++) setTimeout(spawnNumber, i * 150);
            setInterval(() => { if (container.children.length < 35) spawnNumber(); }, 800);
        }

        createFallingNumbers();
        loadProfile();
    </script>
</body>
</html>

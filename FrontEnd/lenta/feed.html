<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ЕПТА - Лента</title>
    <link rel="stylesheet" href="../you/style.css">
    <link rel="stylesheet" href="feed.css">
    <style>
        .feed-post-creator {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #61DE2A;
        }
        
        .feed-post-creator-header {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .feed-post-creator-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(34, 34, 34, 0.95);
            border: 2px solid #61DE2A;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .feed-post-creator-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .feed-post-creator-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 14px 18px;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            min-height: 70px;
            outline: none;
            transition: all 0.3s;
        }
        
        .feed-post-creator-input:focus {
            border-color: #61DE2A;
            box-shadow: 0 0 20px rgba(97, 222, 42, 0.3);
        }
        
        .feed-post-creator-input::placeholder {
            color: #444;
        }
        
        .feed-post-creator-actions {
            margin-left: 60px;
        }
        
        .feed-creator-files {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .feed-creator-file {
            background: rgba(97, 222, 42, 0.1);
            border: 1px solid rgba(97, 222, 42, 0.3);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #61DE2A;
        }
        
        .feed-creator-file-remove {
            cursor: pointer;
            color: #ff4444;
            font-weight: bold;
        }
        
        .feed-creator-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .feed-creator-btn {
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(97, 222, 42, 0.3);
            border-radius: 20px;
            color: #888;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }
        
        .feed-creator-btn:hover {
            background: rgba(97, 222, 42, 0.15);
            border-color: #61DE2A;
            color: #61DE2A;
        }
        
        .feed-submit-btn {
            padding: 8px 20px;
            background: rgba(97, 222, 42, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid #61DE2A;
            border-radius: 20px;
            color: #61DE2A;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }
        
        .feed-submit-btn:hover {
            background: rgba(97, 222, 42, 0.2);
            box-shadow: 0 0 15px rgba(97, 222, 42, 0.3);
        }
        
        .post-cooldown {
            display: none;
            align-items: center;
            gap: 5px;
            background: rgba(97, 222, 42, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(97, 222, 42, 0.3);
            color: #61DE2A;
            font-size: 13px;
        }
        
        .post-files {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .post-file-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid #333;
            cursor: pointer;
        }
        
        .post-file-video {
            max-width: 300px;
            max-height: 200px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        
        .post-file-other {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 15px;
            background: rgba(97, 222, 42, 0.1);
            border: 1px solid #61DE2A;
            border-radius: 8px;
            color: #61DE2A;
            font-size: 13px;
        }
        
        @media (max-width: 768px) {
            .feed-post-creator-actions {
                margin-left: 50px;
            }
            .feed-creator-btn, .feed-submit-btn {
                padding: 6px 12px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <video autoplay loop muted playsinline class="background-video">
        <source src="../oboi/video.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <div class="falling-numbers" id="fallingNumbers"></div>

    <div class="burger-menu" id="burgerMenu">
        <div class="burger-icon" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="menu-panel" id="menuPanel">
            <div class="menu-content">
                <a href="feed.html" class="menu-item active">
                    <img src="../png/grid.png" class="menu-icon" alt=""> Лента
                </a>
                <a href="../you/index.html" class="menu-item">
                    <img src="../png/portrait.png" class="menu-icon" alt=""> Профиль
                </a>
                <a href="../you/settings.html" class="menu-item">
                    <img src="../png/sun.png" class="menu-icon" alt=""> Настройки
                </a>
                <a href="../sms/sms.html" class="menu-item">
                    <img src="../png/comment.png" class="menu-icon" alt=""> Чаты
                </a>
            </div>
        </div>
    </div>

    <header class="header">
        <div class="header-inner">
            <a href="../you/index.html" class="logo">ЕПТА</a>
            <div class="search-box">
                <input type="text" class="search-input" placeholder="Поиск...">
            </div>
        </div>
    </header>

    <div class="feed-container">
        <div class="feed-grid">
            <div class="feed-main">
                <div class="feed-post-creator">
                    <div class="feed-post-creator-header">
                        <div class="feed-post-creator-avatar">
                            <img src="../png/portrait.png" alt="">
                        </div>
                        <textarea class="feed-post-creator-input" id="feedPostInput" placeholder="Что нового? Поделись мыслями..."></textarea>
                    </div>
                    <div class="feed-post-creator-actions">
                        <div class="feed-creator-files" id="feedFileList"></div>
                        <div class="feed-creator-buttons">
                            <input type="file" id="feedFileInput" style="display:none" multiple accept="image/*,video/*">
                            <button class="feed-creator-btn glass-btn" onclick="openFeedFileSelector()">
                                <img src="../png/camera.png" class="icon-18" alt=""> Прикрепить
                            </button>
                            <div class="post-cooldown" id="postCooldownDisplay">
                                <img src="../png/hourglass.png" class="icon-16" alt="" style="filter: invert(72%) sepia(79%) saturate(500%) hue-rotate(45deg);">
                                <span>0 сек</span>
                            </div>
                            <button class="feed-submit-btn glass-btn" onclick="submitFeedPost()">
                                <img src="../png/paper-plane.png" class="icon-18" alt=""> Опубликовать
                            </button>
                        </div>
                    </div>
                </div>

                <div class="feed-tabs">
                    <button class="feed-tab active" onclick="switchFeedTab(this, 'recommendations')">Рекомендации</button>
                    <button class="feed-tab" onclick="switchFeedTab(this, 'popular')">Популярное</button>
                    <button class="feed-tab" onclick="switchFeedTab(this, 'fresh')">Свежее</button>
                </div>

                <div class="filters-bar" id="filtersBar">
                    <span class="filter-label">Сортировка:</span>
                    <button class="filter-btn active" onclick="setFeedFilter('date', this)">По дате</button>
                    <button class="filter-btn" onclick="setFeedFilter('views', this)">По просмотрам</button>
                    <button class="filter-btn" onclick="setFeedFilter('reposts', this)">По репостам</button>
                    <button class="filter-btn" onclick="setFeedFilter('likes', this)">По лайкам</button>
                    <button class="filter-btn" onclick="setFeedFilter('comments', this)">По комментариям</button>
                </div>

                <div class="feed-content" id="feedContent">
                    <div id="feedPosts"></div>
                </div>
            </div>

            <aside class="feed-sidebar">
                <div class="sidebar-card">
                    <div class="sidebar-title">Топ хештеги</div>
                    <div class="hashtags-cloud" id="topHashtags"></div>
                </div>
                <div class="sidebar-card">
                    <div class="sidebar-title">Топ посты</div>
                    <div class="popular-posts" id="topPosts"></div>
                </div>
            </aside>
        </div>
    </div>

    <div class="modal-overlay" id="feedCommentsModal">
        <div class="modal" style="max-width: 500px;">
            <div class="modal-title">
                <img src="../png/comment.png" class="icon-20" alt=""> Комментарии
            </div>
            <div class="comments-list" id="feedCommentsList"></div>
            <div class="comment-input-wrapper">
                <input type="text" class="modal-input" id="feedCommentInput" placeholder="Написать комментарий...">
                <button class="btn btn-primary glass-btn" onclick="addFeedComment()">
                    <img src="../png/paper-plane.png" class="icon-16" alt=""> Отправить
                </button>
            </div>
            <div class="modal-actions" style="margin-top:10px;">
                <button class="btn btn-secondary glass-btn" onclick="closeFeedComments()">
                    <img src="../png/cross.png" class="icon-16" alt=""> Закрыть
                </button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="repostModal">
        <div class="modal" style="max-width:400px;">
            <div class="modal-title">
                <img src="../png/users-alt.png" class="icon-20" alt=""> Поделиться с
            </div>
            <div class="repost-contacts" id="repostContacts"></div>
            <div class="modal-actions" style="margin-top:10px;">
                <button class="btn btn-secondary glass-btn" onclick="closeRepostModal()">
                    <img src="../png/cross.png" class="icon-16" alt=""> Отмена
                </button>
            </div>
        </div>
    </div>

    <script src="../you/comments.js"></script>
    <script src="../you/reposts.js"></script>
    <script src="../you/likes.js"></script>
    <script src="feed.js"></script>
</body>
</html>
